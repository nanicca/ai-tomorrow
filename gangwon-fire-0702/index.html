<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강원소방학교 · 생성형 AI 활용 실무 (전혜영)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Hero -->
  <header class="hero">
    <div class="wrap">
      <span class="date" id="강의일자"></span>
      <h1 id="강의명"></h1>
      <p class="subtitle" id="부제"></p>
      <p class="intro" id="소개"></p>
    </div>
  </header>

  <main class="wrap">

    <!-- 강사 소개 -->
    <div class="instructor">
      <div class="box" id="강사"></div>
    </div>

    <!-- 차시 목록 -->
    <section class="section">
      <h2 class="section-title">강의 목차</h2>
      <p class="section-sub">차시를 선택하면 강의안으로 이동합니다.</p>
      <div class="cards" id="차시목록"></div>
    </section>

    <!-- 자료 다운로드 -->
    <section class="section" id="자료섹션">
      <h2 class="section-title">강의 자료</h2>
      <p class="section-sub">강의안과 실습 파일을 내려받으세요.</p>
      <div class="files" id="자료목록"></div>
    </section>

  </main>

  <footer>
    <div class="wrap">© 2026 전혜영 · 강원특별자치도 소방학교 생성형 AI 활용 실무</div>
  </footer>

  <script>
    // data.js·app.js를 항상 최신으로 불러옵니다 (캐시 방지)
    (function () {
      var v = Date.now();
      function load(src, cb) {
        var s = document.createElement("script");
        s.src = src + "?v=" + v;
        s.onload = cb;
        document.head.appendChild(s);
      }
      load("data.js", function () { load("app.js", function () { renderIndex(); }); });
    })();
  </script>
</body>
</html>
